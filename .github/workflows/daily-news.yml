name: Daily News Fetcher (6:00 AM IST)

on:
  schedule:
    # 00:30 UTC is exactly 06:00 AM IST
    - cron: '30 0 * * *'
  workflow_dispatch:  # Allows manual triggering

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /cron/fetch-news Endpoint
        run: |
          curl -X POST "${{ secrets.API_BASE_URL }}/cron/fetch-news" \
          -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
          --retry 3 \
          --retry-delay 10 \
          --fail
