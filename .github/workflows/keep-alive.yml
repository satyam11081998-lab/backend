name: Keep Render Alive

# Pings /health every ~10 min so the free-tier Render dyno never sleeps long
# enough (Render sleeps after ~15 min idle) to cold-start the daily jobs.
#
# Replaces the old `* * * * *` (every-minute) + keep_alive.py "7-minute window"
# scheme: GitHub heavily throttles/skips minute-level schedules, so the chosen
# minute was frequently missed → gaps > 15 min → the dyno slept anyway. A plain
# every-10-min curl is dependency-free and reliable within GitHub's scheduling
# granularity.
#
# Optional secret: API_BASE_URL (falls back to the production URL below).
# NOTE: GitHub may still delay scheduled runs under load, and disables schedules
# after 60 days of repo inactivity. For guaranteed always-on, use a paid (non-
# sleeping) Render instance, or an external uptime pinger (cron-job.org /
# UptimeRobot) on /health every 5 min.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (< Render's 15-min sleep)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health (best-effort, warms the dyno)
        run: |
          BASE="${{ secrets.API_BASE_URL }}"
          [ -z "$BASE" ] && BASE="https://consilio-backend.onrender.com"
          BASE="${BASE%/}"
          echo "Pinging $BASE/health"
          curl -sS -o /dev/null -w 'health: %{http_code} in %{time_total}s\n' \
            --max-time 90 --retry 3 --retry-all-errors --retry-delay 12 \
            "$BASE/health" || echo "keep-alive ping failed (non-fatal)"
